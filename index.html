  <script>

  <script src="https://esm.sh/run" type="module"></script>
  <style>
    @keyframes scan-line {
      0% { top: 0%; }
      100% { top: 100%; }
    }
    .scan-line {
      height: 2px;
      background: linear-gradient(to right, transparent, #3b82f6, transparent);
      position: absolute;
      width: 100%;
      animation: scan-line 2s linear infinite;
    }
    body {
      margin: 0;
      -webkit-tap-highlight-color: transparent;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif;
    }
    #loader-fallback {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: #f8fafc;
      z-index: 9999;
      position: fixed;
      inset: 0;
      transition: opacity 0.5s ease-out;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #e2e8f0;
      border-top: 4px solid #2563eb;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">
  <div id="loader-fallback">
    <div class="spinner"></div>
    <p style="margin-top: 20px; color: #64748b; font-weight: 600; font-family: sans-serif;">MedRoute wordt geladen...</p>
  </div>
  <div id="root"></div>
  <script type="text/tsx" src="index.tsx"></script>
</body>
