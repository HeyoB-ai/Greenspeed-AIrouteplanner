  <style>
    body { margin: 0; background: #f8fafc; font-family: ui-sans-serif, system-ui, sans-serif; overflow-x: hidden; }
    #loader-fallback {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #ffffff;
      z-index: 9999;
    }
    .spinner {
      width: 48px;
      height: 48px;
      border: 5px solid #f3f3f3;
      border-top: 5px solid #2563eb;
      border-radius: 50%;
      animation: spin 0.8s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .scan-line {
      height: 2px;
      background: linear-gradient(to right, transparent, #3b82f6, transparent);
      position: absolute;
      width: 100%;
      animation: scan-line-anim 2s linear infinite;
    }
    @keyframes scan-line-anim { 0% { top: 0%; } 100% { top: 100%; } }
  </style>
</head>
