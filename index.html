<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MedRoute | Privacy-First Medicijnbezorging</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    // Polyfill voor process.env die door @google/genai wordt verwacht
    window.process = window.process || { env: { NODE_ENV: 'production' } };
  </script>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@19.0.0",
    "react-dom": "https://esm.sh/react-dom@19.0.0",
    "react-dom/client": "https://esm.sh/react-dom@19.0.0/client",
    "lucide-react": "https://esm.sh/lucide-react@0.475.0?external=react",
    "@google/genai": "https://esm.sh/@google/genai@1.35.0",
    "recharts": "https://esm.sh/recharts@2.15.0?external=react,react-dom",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/"
  }
}
</script>
  <script src="https://esm.sh/run" type="module"></script>
  <style>
    @keyframes scan-line {
      0% { top: 0%; }
      100% { top: 100%; }
    }
    .scan-line {
      height: 2px;
      background: linear-gradient(to right, transparent, #3b82f6, transparent);
      position: absolute;
      width: 100%;
      animation: scan-line 2s linear infinite;
    }
    body {
      -webkit-tap-highlight-color: transparent;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif;
    }
    .no-select {
      user-select: none;
      -webkit-user-select: none;
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen selection:bg-blue-100">
  <div id="root">
    <!-- Fallback content in case React fails to mount -->
    <div id="loader-fallback" style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif;">
      <div style="width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; animation: spin 1s linear infinite;"></div>
      <p style="margin-top: 20px; color: #64748b;">MedRoute wordt geladen...</p>
      <style>@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }</style>
    </div>
  </div>
  <script type="text/tsx" src="index.tsx"></script>
</body>
</html>
