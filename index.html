<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MedRoute | Privacy-First</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    // Global environment setup
    window.process = { env: { NODE_ENV: 'production', API_KEY: '' } };
    
    // Foutopsporing naar scherm
    window.onerror = function(msg, url, line, col, error) {
      console.error("Systeemfout:", msg, error);
      const status = document.getElementById('loader-status');
      if (status) status.innerHTML = '<span style="color:#ef4444">Fout bij laden: ' + msg + '</span>';
      return false;
    };
  </script>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.2.0",
    "react-dom": "https://esm.sh/react-dom@18.2.0",
    "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
    "lucide-react": "https://esm.sh/lucide-react@0.446.0?external=react,react-dom",
    "@google/genai": "https://esm.sh/@google/genai@1.35.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/"
  }
}
</script>
  <!-- esm.sh/run is verantwoordelijk voor het compileren van TSX in de browser -->
  <script src="https://esm.sh/run" type="module"></script>
  <style>
    body { margin: 0; background: #f8fafc; font-family: ui-sans-serif, system-ui, -apple-system, sans-serif; }
    #loader-fallback {
      position: fixed; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; background: white; z-index: 9999;
      transition: opacity 0.4s ease-out;
    }
    .spinner {
      width: 40px; height: 40px; border: 4px solid #f1f5f9;
      border-top: 4px solid #2563eb; border-radius: 50%; animation: spin 1s linear infinite;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .no-select { user-select: none; }
  </style>
</head>
<body>
  <div id="loader-fallback">
    <div class="spinner"></div>
    <div style="margin-top: 20px; text-align: center;">
      <p style="font-weight: 800; color: #1e293b; margin: 0; font-size: 1.2rem;">MedRoute</p>
      <p id="loader-status" style="color: #64748b; font-size: 0.9rem; margin-top: 4px;">Systeem wordt voorbereid...</p>
    </div>
  </div>
  
  <div id="root"></div>

  <!-- De TSX file wordt ingeladen door esm.sh/run -->
  <script type="text/tsx" src="index.tsx"></script>

  <script>
    // Fail-safe: als na 5 seconden de app nog niet is geladen, verbergen we de loader sowieso
    // Dit voorkomt dat de gebruiker "eindeloos" naar de spinner kijkt bij een scriptfout.
    setTimeout(() => {
      const loader = document.getElementById('loader-fallback');
      if (loader && loader.style.display !== 'none') {
        console.warn("Fail-safe: Loader geforceerd verwijderd.");
        loader.style.opacity = '0';
        setTimeout(() => { loader.style.display = 'none'; }, 400);
      }
    }, 5000);
  </script>
</body>
</html>
