<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MedRoute | Privacy-First Medicijnlogistiek</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-50">
  <!-- Fallback loader met inline CSS om zandloper-stuck te voorkomen -->
  <div id="loader-fallback" style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:white;z-index:9999;font-family:sans-serif;">
    <div style="text-align:center;">
      <div style="width:40px;height:40px;border:4px solid #f3f3f3;border-top:4px solid #2563eb;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 16px;"></div>
      <p style="color:#64748b;font-weight:700;letter-spacing:-0.025em;">MedRoute Beveiligd Laden...</p>
    </div>
    <style>
      @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
      body { margin: 0; padding: 0; }
    </style>
  </div>
  <div id="root"></div>
  <script type="module" src="/main.tsx"></script>
</body>
</html>
